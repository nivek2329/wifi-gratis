<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WiFi Gratis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  .bg-noise {
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 20px;
    max-width: 480px;
    width: 100%;
  }

  .top-bar {
    background: #1aff8c;
    color: #0d0d0d;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    padding: 8px 30px;
    border-radius: 40px 40px 0 0;
    text-align: center;
    width: 90%;
  }

  .img-wrapper {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 4px solid #1aff8c;
    position: relative;
    background: #111;
    box-shadow: 0 0 40px rgba(26,255,140,0.15);
  }

  .img-wrapper img {
    width: 100%;
    height: 340px;
    object-fit: cover;
    display: block;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85) rotate(-2deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .message-box {
    background: #ff2d55;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 3.2rem);
    letter-spacing: 2px;
    text-align: center;
    padding: 18px 24px 14px;
    width: 100%;
    line-height: 1.1;
    border-radius: 0 0 12px 12px;
    border: 4px solid #1aff8c;
    border-top: none;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    animation: slideUp 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sub {
    margin-top: 18px;
    color: #555;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeIn 1s 0.6s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .emoji-bounce {
    display: inline-block;
    animation: bounce 1s infinite alternate;
    font-size: 2.5rem;
    margin-top: 10px;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-10px); }
  }
</style>
</head>
<body>
<div class="bg-noise"></div>

<div class="container">
  <div class="top-bar">⚡ WIFI GRATIS ⚡</div>

  <div class="img-wrapper">
    <img id="troll-img" src="" alt="Troll"/>
  </div>

  <div class="message-box" id="msg-box">DEJA EL PESO EN SU LUGAR</div>

  <div class="emoji-bounce" id="emoji">😂</div>
  <div class="sub">wifi.gratis.co — velocidad garantizada</div>
</div>

<script>
  const images = [
    "mono.jpg",
    "caballo.jpg",
    "perro1.jpg",
    "perro2.jpg"
  ];

  const msgs = [
    "NO HAY WIFI PA' TI 😂 DEJA EL PESO EN SU LUGAR 🖕",
    "¡RECOGE ESO QUE BOTASTE! 🙂",
    "NO HAY WIFI PA' TI 😂 DEJA EL PESO EN SU LUGAR 🖕",
    "AQUÍ NO HAY SEÑAL solo esfuerzo consentrate 💀",
  ];

  const emojis = ["🖕", "😂", "🙂", "💀"];

  // Contador global usando localStorage para rotación entre visitantes
  let count = parseInt(localStorage.getItem('wifi_count') || '0');
  const idx = count % images.length;
  localStorage.setItem('wifi_count', count + 1);

  document.getElementById('troll-img').src = images[idx];
  document.getElementById('msg-box').textContent = msgs[idx];
  document.getElementById('emoji').textContent = emojis[idx];
</script>
</body>
</html>
